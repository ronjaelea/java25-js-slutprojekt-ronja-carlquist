<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/search.css">
    <script src="../js/search.js" type="module"></script>
    <title>Ronja's Movie Database</title>
</head>
<body>
    <header>
        <div class="logo-container">
            <a href="../index.html">
                <img src="../resources/logo.png" alt="RMDB">
            </a>
        </div>
        <nav class="top-nav">
            <ul>
                <li><a href="../index.html">Home</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <form class="search-form" method="get">
                <div>
                    <input type="radio" name="category" id="movies" value="movies" checked="true">
                    <label for="movies">Movies</label>
                    <input type="radio" name="category" id="persons" value="persons">
                    <label for="persons">Persons</label>
                </div>
                <div>
                    <input type="text" name="query" id="search-query" placeholder="Search…" required>
                    <select name="sort" id="sort-select">
                        <option value="">Sort by…</option>
                        <option value="az">A–Z</option>
                        <option value="za">Z–A</option>
                        <option value="pop-high">Rating (high–low)</option>
                        <option value="pop-low">Rating (low–high)</option>
                    </select>
                    <button>Search</button>
                </div>
            </form>
        </section>
        <section>
            <div id="result-container"></div>
        </section>
    </main>

    <footer></footer>
</body>
</html>
